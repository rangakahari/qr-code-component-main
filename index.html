<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/css-reset.css">
<link rel="stylesheet" href="styles/variable.css">
<link rel="stylesheet" href="styles/style.css">
<link rel="stylesheet" 
media="screen and (max-width: 375px)"
href="styles/variable.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main class="main-section">
    <section class="qr-code-section">
      <img src="images/image-qr-code.png" alt="" class="qr-code-image">
      <h1 class="qr-code-header">Improve your front-end skills by building projects</h1>
      <p class="qr-code-text">
      Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
      </p>
    </section>
    
    
  </main>

    Coded by <a href="#">Ranga Kahari</a>. -->
  </div>
</body>
</html>
